# Deployment recipe — mirrors How to Upgrade Chia.md
name: chia-upgrade-default
description: Git-based Chia upgrade (stop, update, install, start harvester or farmer)

steps:
  - id: precheck
    description: Verify chia_root exists and is a git clone (source install required)
  - id: upgrade_check
    description: Skip deploy when already on origin/latest (unless --force)
  - id: backup_config
    description: Backup ~/.chia/mainnet/config and repo config.yaml
  - id: stop_services
    description: Stop Chia services
  - id: remove_venvs
    description: Remove old virtual environments
  - id: git_update
    description: Fetch and checkout latest release branch
  - id: git_clean_check
    description: Reset submodules, remove untracked files, verify clean tree
  - id: install
    description: Run install.sh (may take several minutes)
  - id: chia_init
    description: Initialize upgraded Chia; run --fix-ssl-permissions if SSL warnings appear
  - id: start_services
    description: Start harvester or farmer (per node role in config)
  - id: postcheck
    description: Verify chia version; optional farmer connectivity check
